<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đồ dùng</title>
   <link rel="stylesheet" href="../css/stylemangdoituong.css">
   <link rel="stylesheet" href="../js/mangdoituong.js">

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    #list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
    }

    .card h3 {
      margin: 10px 0;
    }

    .price {
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>Danh sách đồ dùng</h1>

  <div id="list"></div>

  <script>
    const doDung = [
      {
        id: 1,
        ten: "Bàn học",
        gia: 150000,
        hinh:"../image/image1.jpg"
      },
      {
        id: 2,
        ten: "Ghế gaming",
        gia: 1500000,
        hinh: "../image/image2.jpg"
      },
      {
        id: 3,
        ten: "Laptop",
        gia: 20000000,
        hinh:"../image/image3.jpg"
      }
    ];

    const list = document.getElementById("list");

    doDung.forEach(item => {
      list.innerHTML += `
        <div class="card">
          <img src="${item.hinh}" alt="${item.ten}">
          <h3>${item.ten}</h3>
          <p class="price">${item.gia.toLocaleString()} đ</p>
        </div>
      `;
    });
  </script>

</body>
</html>
